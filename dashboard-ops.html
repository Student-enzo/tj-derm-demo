<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Medical-assistant console · Dermatology &amp; Skin Cancer Center</title>
<link rel="icon" href="assets/img/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="backdrop" onclick="TJ.toggleNav()"></div>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="ma"></div>
  </div>
</div>

<script src="assets/js/store.js"></script>
<script src="assets/js/inventory.js"></script>
<script src="assets/js/app.js"></script>
<script>
TJ.mount({active:'dashboard-ops', onReady:render});
STORE.on(render);

/* ---------- the standard case kit (point-of-care deduction) ---------- */
var KIT=[
  {id:'i-lido', qty:1}, {id:'i-gauze', qty:4}, {id:'i-cur', qty:1},
  {id:'i-nylon', qty:1}, {id:'i-alcl', qty:1}
];

function logMohsCase(){
  KIT.forEach(function(k){ if(STORE.item(k.id)) STORE.useStock({itemId:k.id, qty:k.qty}); });
  TJ.toast('Mohs case logged · kit deducted (FEFO)');
}

function receiveDelivery(){ location.href='receive-scan.html'; }

function quickUse(){
  var opts=STORE.data().items.filter(function(i){return !i.tank;})
    .map(function(i){return {value:i.id, label:i.name};});
  TJ.modal({
    title:'Quick use', sub:'Log a single item used at the point of care',
    fields:[
      {name:'itemId', label:'Item', type:'select', options:opts, value:opts[0]&&opts[0].value},
      {name:'qty', label:'Quantity used', type:'number', value:1}
    ],
    submitLabel:'Log use',
    onSubmit:function(v){
      var q=+v.qty||0; if(q<=0) return false;
      var it=STORE.item(v.itemId);
      STORE.useStock({itemId:v.itemId, qty:q});
      TJ.toast('Used '+q+' × '+(it?it.name:'item'));
    }
  });
}

/* ---------- relative time ---------- */
function ago(ts){
  var s=Math.max(0, Math.floor((Date.now()-ts)/1000));
  if(s<60) return s+'s ago';
  var m=Math.floor(s/60); if(m<60) return m+'m ago';
  var h=Math.floor(m/60); if(h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

function actionPill(action){
  var a=(action||'').toLowerCase(), cls='neutral';
  if(a.indexOf('receiv')>-1) cls='ok';
  else if(a.indexOf('po')>-1) cls='ok';
  else if(a.indexOf('alert')>-1) cls='bad';
  else if(a.indexOf('adjust')>-1) cls='warn';
  else if(a.indexOf('use')>-1||a.indexOf('dispens')>-1) cls='neutral';
  return '<span class="pill '+cls+'">'+action+'</span>';
}

/* ---------- big action card ---------- */
function bigCard(icon, title, sub, onclick){
  return '<div class="panel pad" onclick="'+onclick+'" role="button" tabindex="0" '+
    'style="cursor:pointer;display:flex;flex-direction:column;gap:13px;min-height:148px">'+
    '<div style="width:54px;height:54px;border-radius:16px;display:grid;place-items:center;'+
      'background:var(--accent-soft);color:var(--accent)">'+TJ.icon(icon,'ico-lg')+'</div>'+
    '<div>'+
      '<div style="font-size:18px;font-weight:800;letter-spacing:-.3px">'+title+'</div>'+
      '<div class="tiny" style="margin-top:4px;text-transform:none;letter-spacing:0;color:var(--ink-2)">'+sub+'</div>'+
    '</div></div>';
}

function render(){
  var k=INV.kpis();

  /* needs attention: reorders (red) + expiring ≤7 (red/yellow) */
  var reorder=INV.reorderList();
  var expiring=INV.expiringList(7);
  var attn='';
  reorder.forEach(function(r){
    attn+='<div class="lrow">'+
      '<div class="ic">'+TJ.icon('truck')+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="t">'+r.it.name+'</div>'+
        '<div class="d"><span class="pill bad" style="margin-right:8px">Reorder</span>'+
          INV.onHand(r.it)+' on hand · suggest '+r.qty+' '+(r.it.unit||'')+' · '+(r.vendor||'')+'</div>'+
      '</div>'+
      '<button class="btn primary sm" onclick="orderItem(\''+r.it.id+'\')">Order</button>'+
      '</div>';
  });
  expiring.forEach(function(e){
    var sev=e.bucket; // 'bad' or 'warn'
    attn+='<div class="lrow">'+
      '<div class="ic">'+TJ.icon('clock')+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="t">'+e.it.name+'</div>'+
        '<div class="d"><span class="pill '+sev+'" style="margin-right:8px">Expiring</span>'+
          'lot '+e.lot.lot+' · '+(e.days<=0?'expired':e.days+'d left')+'</div>'+
      '</div>'+
      '<button class="btn sm" onclick="useItem(\''+e.it.id+'\')">Use</button>'+
      '</div>';
  });
  if(!attn) attn='<div class="lrow"><div class="ic">'+TJ.icon('check')+'</div>'+
    '<div style="flex:1"><div class="t">Nothing urgent — nice.</div>'+
    '<div class="d">No reorders due and nothing expiring this week.</div></div></div>';

  /* today's activity: 6 newest */
  var audit=STORE.data().audit.slice(0,6);
  var act=audit.map(function(a){
    return '<div class="lrow">'+
      '<div style="flex:none">'+actionPill(a.action)+'</div>'+
      '<div style="flex:1;min-width:0"><div class="t" style="font-weight:600;font-size:13.5px">'+a.detail+'</div>'+
        '<div class="d">'+(a.user||'')+'</div></div>'+
      '<div class="cost" style="font-size:12.5px;font-weight:700;color:var(--ink-3)">'+ago(a.ts)+'</div>'+
      '</div>';
  }).join('') || '<div class="lrow"><div class="t">No activity yet today.</div></div>';

  document.getElementById('ma').innerHTML=
    '<div class="page-head">'+
      '<div class="eyebrow">Supply room</div>'+
      '<h2>Hi Jess — quick actions</h2>'+
      '<p>Log a case, receive a delivery, or fix a count. One tap.</p>'+
    '</div>'+

    '<div class="grid g4">'+
      '<div class="panel kpi"><div class="v">'+k.items+'</div><div class="l">Items</div></div>'+
      '<div class="panel kpi"><div class="v">'+k.reorder+'</div><div class="l">To reorder</div></div>'+
      '<div class="panel kpi"><div class="v">'+k.expiring+'</div><div class="l">Expiring ≤30</div></div>'+
      '<div class="panel kpi"><div class="v">'+TJ.money(k.value)+'</div><div class="l">Value</div></div>'+
    '</div>'+

    '<div class="sec-title">'+TJ.icon('zap','ico-sm')+'Quick actions</div>'+
    '<div class="grid g3">'+
      bigCard('scissors','Log a Mohs case','Deducts the consumable kit in one tap','logMohsCase()')+
      bigCard('truck','Receive a delivery','Scan the box — lot &amp; expiry auto-fill','receiveDelivery()')+
      bigCard('box','Quick use','Log a single item used','quickUse()')+
    '</div>'+

    '<div class="sec-title">'+TJ.icon('alert','ico-sm')+'Needs attention</div>'+
    '<div class="panel">'+attn+'</div>'+

    '<div class="sec-title">'+TJ.icon('clock','ico-sm')+'Today’s activity</div>'+
    '<div class="panel">'+act+'</div>';
}

/* needs-attention one-tap handlers */
function orderItem(id){
  STORE.sendPO({itemId:id, qty:INV.suggestedQty(STORE.item(id))});
  var it=STORE.item(id);
  TJ.toast('Order sent · '+(it?it.name:'item'));
}
function useItem(id){
  STORE.useStock({itemId:id, qty:1});
  var it=STORE.item(id);
  TJ.toast('Used 1 × '+(it?it.name:'item'));
}
</script>
</body>
</html>
