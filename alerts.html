<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Alerts &amp; Reorder · TJ DERM</title>
<link rel="icon" href="assets/img/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="backdrop" onclick="TJ.toggleNav()"></div>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
      <div class="page-head">
        <div class="eyebrow">The “less to do” engine</div>
        <h2>Alerts &amp; reorder</h2>
        <p>The system watches every item and drafts the orders. Staff confirm — or let staples reorder themselves.</p>
      </div>

      <div style="margin-bottom:18px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <span class="flag">Workflow option</span>
        <div class="seg">
          <button id="wApprove" class="on" onclick="setMode(false)">Doctor approves each</button>
          <button id="wAuto" onclick="setMode(true)">Auto-reorder at par</button>
        </div>
        <span class="tiny" id="hint"></span>
      </div>

      <div class="row stretch">
        <!-- DIGEST -->
        <div class="panel" style="flex:1;min-width:300px">
          <div class="p-head"><strong>Daily expiry digest</strong><span class="tiny" style="margin-left:auto">one email, not per-item noise</span></div>
          <div class="pad" style="display:flex;flex-direction:column;gap:12px" id="digest"></div>
        </div>
        <!-- DRAFTS -->
        <div class="panel" style="flex:1;min-width:300px">
          <div class="p-head"><strong id="poHead">Reorder drafts</strong><span class="tiny" style="margin-left:auto">vendor &amp; qty pre-filled</span></div>
          <div class="pad" style="display:flex;flex-direction:column;gap:12px" id="pos"></div>
        </div>
      </div>

      <div class="note" id="note"></div>
    </div>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script>
TJ.mount({active:'alerts', onReady:init});
var DIGEST=[
  {sev:'bad', n:'Curettes (sterile)', d:'6 days', tag:'7-day'},
  {sev:'bad', n:'Lidocaine 1%', d:'5 days', tag:'7-day'},
  {sev:'warn',n:'Aluminum chloride 20%', d:'24 days', tag:'30-day'},
  {sev:'warn',n:'Formalin 10%', d:'21 days', tag:'30-day'}
];
var POS=[
  {id:'po-lido', t:'Lidocaine 1% × 24', cost:'$186', v:'Henry Schein · acct #4471 · lead 3 days'},
  {id:'po-ln2',  t:'Liquid Nitrogen refill', cost:'$210', v:'Airgas · acct #8820 · same-day'},
  {id:'po-form', t:'Formalin 10% × 6', cost:'$94', v:'McKesson · acct #2210 · lead 2 days'}
];
function init(){
  document.getElementById('digest').innerHTML=DIGEST.map(function(e){
    return '<div style="display:flex;align-items:center;gap:11px"><span class="dot '+e.sev+'"></span>'+
      '<strong style="font-size:14px">'+e.n+'</strong><span class="muted" style="font-size:13px">— '+e.d+'</span>'+
      '<span class="pill '+e.sev+'" style="margin-left:auto">'+e.tag+'</span></div>'; }).join('');
  setMode(!!TJ.state.autoReorder, true);
}
function renderPos(auto){
  document.getElementById('pos').innerHTML=POS.map(function(p){
    var sent=auto || TJ.state.pos[p.id]==='sent';
    return '<div class="panel pad" style="box-shadow:var(--ring-1)">'+
      '<div style="display:flex;justify-content:space-between;align-items:center"><strong>'+p.t+'</strong><span class="cost">'+p.cost+'</span></div>'+
      '<div class="tiny" style="margin:5px 0 11px">'+p.v+'</div>'+
      (sent
        ? '<button class="btn ghost full" disabled>'+TJ.icon('check','ico-sm')+(auto?'Sent automatically':'PO sent')+'</button>'
        : '<button class="btn primary full" onclick="sendPo(\''+p.id+'\')">'+TJ.icon('truck','ico-sm')+'Send PO</button>')+
    '</div>'; }).join('');
}
function sendPo(id){ TJ.state.pos[id]='sent'; TJ.save(); renderPos(false); TJ.toast('PO sent to vendor · tracked Draft → Sent'); }
function setMode(auto, silent){
  TJ.state.autoReorder=auto; TJ.save();
  document.getElementById('wApprove').classList.toggle('on',!auto);
  document.getElementById('wAuto').classList.toggle('on',auto);
  document.getElementById('hint').textContent=auto?'Staples reorder themselves at par — the doctor sees only exceptions.':'Nothing orders without a tap — full control.';
  document.getElementById('poHead').textContent=auto?'Auto-sent orders':'Reorder drafts';
  document.getElementById('note').innerHTML=TJ.icon(auto?'zap':'shield')+'<div>'+(auto
    ? '<strong>Auto-reorder.</strong> When an item hits its par level the PO sends to the preferred vendor automatically and just logs here. Best for predictable staples.'
    : '<strong>Approve-each.</strong> Every reorder waits for a one-tap confirmation. Best while the practice builds trust in the par levels.')+'</div>';
  renderPos(auto);
  if(!silent) TJ.toast(auto?'Auto-reorder on':'Approve-each on');
}
</script>
</body>
</html>
