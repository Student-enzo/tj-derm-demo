<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Today &middot; Dermatology &amp; Skin Cancer Center</title>
<link rel="icon" href="assets/img/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="backdrop" onclick="TJ.toggleNav()"></div>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content"></div>
  </div>
</div>

<script src="assets/js/store.js"></script>
<script src="assets/js/inventory.js"></script>
<script src="assets/js/app.js"></script>
<script>
TJ.mount({active:'dashboard', onReady:render});

var DOMAINS=[
  {name:'Surgical', icon:'scissors'},
  {name:'Lab',      icon:'flask'},
  {name:'LN2',      icon:'snow'},
  {name:'Topical',  icon:'droplet'}
];

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

/* compact label for a procedure-type → the doctor's shorthand */
function procLabel(t){
  return {
    'Mohs surgery':'Mohs',
    'Excision, malignant':'malignant exc.',
    'Excision, benign':'benign exc.',
    'Biopsy':'biopsy',
    'Cryotherapy':'cryo',
    'Phototherapy':'photo'
  }[t] || t;
}

/* "for 24 Mohs, 14 biopsy" — why this item is on the list */
function driverWhy(drivers){
  if(!drivers) return '';
  var parts=Object.keys(drivers).map(function(t){ return drivers[t]+' '+procLabel(t); });
  return parts.length ? 'for '+parts.join(', ') : '';
}

function approveReorder(id){
  var r=INV.reorderList().filter(function(x){return x.it.id===id;})[0];
  if(!r) return;
  STORE.purchase({itemId:id, qty:r.qty});
  TJ.toast('Ordered — your team takes it from here');
}

/* ---------- WEEK-AHEAD STRIP ---------- */
/* one calm band: the booked week is already accounted for in supply */
function renderWeekAhead(){
  var load=INV.procedureLoad(7);
  var total=(load&&load.total)||0;
  if(total===0) return ''; // nothing booked → no band, stay uncluttered
  var mohs=(load.byType&&load.byType['Mohs surgery'])||0;
  var impact=INV.forecastImpact(7)||[];
  var shortN=impact.filter(function(x){return x.short;}).length;

  var supply = shortN===0
    ? 'Supplies are handled — every item is covered.'
    : 'Supplies are handled — '+shortN+' item'+(shortN===1?'':'s')+' would run short, and '+(shortN===1?"it's":"they're")+' already on the shopping list.';

  var caseLine=total+' case'+(total===1?'':'s')+' booked this week'+(mohs>0?' ('+mohs+' Mohs)':'')+'.';

  return '<div class="note" style="margin-top:16px">'+TJ.icon('calendar')+
    '<div><div style="font-weight:600">'+caseLine+' '+esc(supply)+'</div>'+
    '<div style="margin-top:6px;font-size:13px">'+
      '<a href="schedule.html" style="font-weight:600;text-decoration:none">View schedule &rarr;</a>'+
      '<a href="shopping.html" style="font-weight:600;text-decoration:none;margin-left:16px">Shopping list &rarr;</a>'+
    '</div></div></div>';
}

/* ---------- HERO ---------- */
function renderHero(){
  var reorders=INV.reorderList();
  var exp7=INV.expiringList(7);
  var ln2=INV.ln2(STORE.item('i-ln2'));
  var blockedPA=STORE.data().priorAuth.filter(function(p){return p.stage!=='Approved';});

  // nothing critical → big calm green tile
  if(reorders.length===0 && exp7.length===0 && ln2.status!=='bad' && blockedPA.length===0){
    return '<div class="panel tile ok"><div class="bar"></div>'+
      '<div class="pad-lg" style="display:flex;gap:18px;align-items:center">'+
        '<div class="ic" style="width:56px;height:56px;border-radius:14px;flex:none">'+TJ.icon('check','ico-lg')+'</div>'+
        '<div><div style="font-size:21px;font-weight:800;letter-spacing:-.3px">Everything’s stocked. Nothing’s blocking your day.</div>'+
        '<div class="muted" style="font-size:14px;margin-top:4px">Your team is on top of it.</div></div>'+
      '</div></div>';
  }

  var rows=[];

  // 1) reorder items — single "Approve" action
  reorders.forEach(function(r){
    var it=r.it;
    if(it.tank) return; // LN2 handled below
    var sev=(INV.onHand(it)<=it.reorderPoint)?'bad':'warn';
    var why=driverWhy(r.drivers); // why the schedule needs it
    rows.push('<div class="lrow" style="flex-wrap:wrap;border-left:4px solid var('+(sev==='bad'?'--bad':'--warn')+')">'+
      '<div class="ic" style="color:var('+(sev==='bad'?'--bad-ink':'--warn-ink')+')">'+TJ.icon('box')+'</div>'+
      '<div style="min-width:0;flex:1 1 60%"><div class="t">'+esc(it.name)+' — only '+INV.onHand(it)+' left</div>'+
      '<div class="d">'+esc(r.vendor||'')+' · suggested '+r.qty+' '+esc(it.unit)+
        (why?' <span class="muted">· '+esc(why)+'</span>':'')+'</div></div>'+
      '<button class="btn primary sm" style="margin-left:auto;flex:none" onclick="approveReorder(\''+esc(it.id)+'\')">Approve</button>'+
      '</div>');
  });

  // 2) LN2 if bad — no action, reorder placed
  if(ln2.status==='bad'){
    rows.push('<div class="lrow" style="flex-wrap:wrap;border-left:4px solid var(--bad)">'+
      '<div class="ic" style="color:var(--bad-ink)">'+TJ.icon('snow')+'</div>'+
      '<div style="min-width:0;flex:1 1 60%"><div class="t">Liquid nitrogen at '+Math.round(ln2.estPct)+'% — reorder placed</div>'+
      '<div class="d">Airgas · ~'+ln2.daysToEmpty+' days to empty</div></div>'+
      '<span class="tiny" style="margin-left:auto">your team is handling it</span>'+
      '</div>');
  }

  // 3) blocked prior-auth — no action, front desk handling it
  blockedPA.forEach(function(p){
    rows.push('<div class="lrow" style="flex-wrap:wrap;border-left:4px solid var(--warn)">'+
      '<div class="ic" style="color:var(--warn-ink)">'+TJ.icon('shield')+'</div>'+
      '<div style="min-width:0;flex:1 1 60%"><div class="t">Patient '+esc(p.pt)+'’s '+esc(p.proc)+' is waiting on '+esc(p.ins)+'</div>'+
      '<div class="d">'+esc(p.stage)+'</div></div>'+
      '<span class="tiny" style="margin-left:auto">front desk is handling it</span>'+
      '</div>');
  });

  rows=rows.slice(0,5);

  return '<div class="panel">'+
    '<div class="p-head"><strong>Needs your eye</strong>'+
      '<span class="pill warn" style="margin-left:auto">'+rows.length+' item'+(rows.length===1?'':'s')+'</span></div>'+
    rows.join('')+
    '</div>';
}

/* ---------- 4 DOMAIN TILES ---------- */
function renderTiles(){
  var roll=INV.domainRollup();
  return DOMAINS.map(function(d){
    var r=roll[d.name]||{count:0,worst:'ok',value:0,low:0};
    var line=r.low>0
      ? '<span class="dot '+r.worst+'"></span>'+r.low+' to reorder'
      : '<span class="dot ok"></span>Healthy';
    return '<div class="panel tile '+r.worst+'"><div class="bar"></div><div class="body">'+
      '<div class="ic">'+TJ.icon(d.icon)+'</div>'+
      '<div class="dn">'+esc(d.name)+'</div>'+
      '<div class="big">'+TJ.money(r.value)+'</div>'+
      '<div class="st">'+line+'</div>'+
    '</div></div>';
  }).join('');
}

/* ---------- LN2 GAUGE ---------- */
function renderLn2(){
  var ln2=INV.ln2(STORE.item('i-ln2'));
  var pct=Math.round(ln2.estPct);
  var label=(ln2.status==='bad'?'Below reorder':ln2.status==='warn'?'Reorder soon':'Healthy');
  return '<div class="panel" style="margin-top:16px">'+
    '<div class="p-head"><strong>Liquid nitrogen</strong></div>'+
    '<div class="pad" style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">'+
      '<div class="gauge" style="--p:'+pct+'"><b>'+pct+'%</b></div>'+
      '<div>'+
        '<div style="font-weight:800;font-size:16px;margin-bottom:8px">≈'+ln2.daysToEmpty+' days to empty</div>'+
        '<span class="pill '+ln2.status+'">'+TJ.icon(ln2.status==='ok'?'check':'alert','ico-sm')+label+'</span>'+
      '</div>'+
    '</div>'+
  '</div>';
}

/* ---------- FOOTER NOTE ---------- */
function renderNote(){
  return '<div class="note" style="margin-top:16px">'+TJ.icon('stetho')+
    '<div>You never type. Your team scans, counts and orders — you just see what needs a decision.</div></div>';
}

/* ---------- RENDER ---------- */
function render(){
  document.getElementById('content').innerHTML=
    '<div class="page-head">'+
      '<div class="eyebrow">Tuesday · 8:14 AM</div>'+
      '<h2>Good morning, Dr. Giuffrida</h2>'+
      '<p>Everything that needs you — nothing else.</p>'+
    '</div>'+
    renderWeekAhead()+
    renderHero()+
    '<div class="grid g4" style="margin-top:16px">'+renderTiles()+'</div>'+
    renderLn2()+
    renderNote();
}

STORE.on(render);
</script>
</body>
</html>
