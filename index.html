<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dermatology &amp; Skin Cancer Center — Inventory &amp; Prior-Auth</title>
<link rel="icon" href="assets/img/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/app.css">
<style>
  .launch{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px 64px;position:relative;z-index:1}
  .launch .brand{display:flex;align-items:center;gap:12px;margin-bottom:30px}
  .launch .brand .nm{font-family:var(--font-display);font-size:19px;font-weight:600;line-height:1.1;color:var(--ink)}
  .launch .brand .nm small{display:block;font-family:var(--font-ui);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin-top:4px}
  .launch h1{font-family:var(--font-display);font-size:clamp(28px,5vw,44px);font-weight:600;text-align:center;margin:0;letter-spacing:-.4px;color:var(--ink);max-width:18ch;line-height:1.08}
  .launch .lead{color:var(--ink-2);font-size:clamp(14px,2vw,17px);text-align:center;max-width:54ch;margin:16px 0 6px}
  .launch .q{margin:34px 0 16px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-3)}
  .roles{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%;max-width:920px}
  .role{display:flex;flex-direction:column;gap:12px;padding:24px;border-radius:var(--r-lg);background:var(--panel);
    box-shadow:var(--ring-1),0 12px 26px -10px rgba(28,43,38,.15);cursor:pointer;text-align:left;transition:.18s var(--ease);border:1px solid transparent}
  .role:hover{transform:translateY(-4px);border-color:var(--brand);box-shadow:var(--ring-1),0 18px 38px -12px rgba(28,43,38,.28)}
  .role .ic{width:50px;height:50px;border-radius:14px;background:var(--accent-soft);color:var(--brand);display:grid;place-items:center}
  .role .ic svg{width:26px;height:26px}
  .role h3{margin:4px 0 0;font-size:18px;font-weight:800;color:var(--ink)}
  .role .meta{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em}
  .role p{margin:0;color:var(--ink-2);font-size:13.5px;line-height:1.5}
  .role .go{margin-top:auto;color:var(--brand);font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
  .launch .foot{color:var(--ink-3);font-size:12.5px;text-align:center;margin-top:36px;line-height:1.6;max-width:60ch}
  @media(max-width:720px){ .roles{grid-template-columns:1fr;max-width:420px} .launch{justify-content:flex-start;padding-top:40px} }
</style>
</head>
<body>
<div class="launch">
  <div class="brand">
    <svg width="44" height="44" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#2c7a62"/><stop offset="1" stop-color="#15402f"/></linearGradient></defs><rect width="40" height="40" rx="11" fill="url(#lg)"/><path d="M15 9.5C20.5 8 23.8 10.2 23.8 13.6 23.8 15.4 27 15.7 27.6 18.4 27.9 19.8 25 20 24.9 21.4 24.8 23 26.2 23.4 24.7 25 23.6 26.3 22 27.4 20.2 28.2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 9.5V28.5" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.85"/><path d="M10 30.5H26" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.55"/></svg>
    <div class="nm">Dermatology &amp; Skin Cancer Center<small>Inventory &amp; Prior-Auth</small></div>
  </div>

  <h1>The supply room that runs itself.</h1>
  <p class="lead">Receive, use, reorder and track insurance — each person gets the screen built for their job, on their device. Everything below is live.</p>

  <div class="q">Who's signing in?</div>
  <div class="roles" id="roles"></div>

  <div class="foot" id="foot"></div>
</div>

<script src="assets/js/store.js"></script>
<script src="assets/js/inventory.js"></script>
<script src="assets/js/app.js"></script>
<script>
var ROLES=[
  ['doctor','stetho','Doctor','Dr. Giuffrida · phone',"A 5-second glance — what's low, what's expiring, which prior-auth blocks today. Tap to approve. He never types."],
  ['staff','box','Supply room','Medical assistants · tablet',"Receive a delivery by scan, log a Mohs case in one tap, watch par levels, and send reorders."],
  ['frontdesk','shield','Front desk','Insurance · desktop',"The prior-authorization queue — sorted by what's on fire, with who to call and one-tap advance."]
];
document.getElementById('roles').innerHTML=ROLES.map(function(r){
  return '<div class="role" onclick="TJ.enter(\''+r[0]+'\')"><div class="ic">'+TJ.icon(r[1])+'</div>'+
    '<div class="meta">'+r[3]+'</div><h3>'+r[2]+'</h3><p>'+r[4]+'</p>'+
    '<div class="go">Enter '+TJ.icon('arrow','ico-sm')+'</div></div>';
}).join('');
document.getElementById('foot').innerHTML='Sample, de-identified data — no real patient information. Works on phone and desktop.<br>One shared source of truth · ~15 live formulas (FEFO, par, LN2 boil-off, days-of-cover) · everything you do persists in your browser.';
</script>
</body>
</html>
