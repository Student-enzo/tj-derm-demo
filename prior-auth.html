<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Prior-authorization · Dermatology &amp; Skin Cancer Center</title>
<link rel="icon" href="assets/img/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="backdrop" onclick="TJ.toggleNav()"></div>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="content"></div>
  </div>
</div>

<script src="assets/js/store.js"></script>
<script src="assets/js/inventory.js"></script>
<script src="assets/js/app.js"></script>
<script>
TJ.mount({active:'auth', onReady:render});
STORE.on(render);

var tab='all'; // 'all' | 'pending' | 'approved'

var STAGE_DOT={ 'Draft':'warn', 'Submitted':'idle', 'Pending insurer':'warn', 'Approved':'ok' };
var STAGE_PILL={ 'Draft':'warn', 'Submitted':'neutral', 'Pending insurer':'warn', 'Approved':'ok' };

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

function apptLabel(i){
  var d=new Date(); d.setDate(d.getDate()+i);
  var day=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  var time=(i%2===0)?'9:00a':'2:00p';
  if(i===0) return 'today '+time;
  if(i===1) return 'tomorrow '+time;
  return day+' '+time;
}
function refNum(pa){ var n=0,id=String(pa.id); for(var k=0;k<id.length;k++) n=(n*31+id.charCodeAt(k))%100000; return ('00000'+n).slice(-5); }

function hint(pa){
  switch(pa.stage){
    case 'Draft': return 'Needs: medical-necessity letter + photos';
    case 'Submitted': return 'Awaiting insurer response';
    case 'Pending insurer': return 'Call '+esc(pa.ins)+': ref #PA-'+refNum(pa)+' · follow up';
    case 'Approved': return 'Approved · valid 60–90d';
    default: return '';
  }
}
function dueLabel(p){
  if(p.dueInDays==null) return '';
  if(p.dueInDays<=0) return 'surgery today';
  if(p.dueInDays===1) return 'surgery tomorrow';
  return 'surgery in '+p.dueInDays+'d';
}
function dueSev(p){ // red if not yet approved and the surgery is inside the payer's turnaround
  if(p.stage==='Approved'||p.dueInDays==null) return 'neutral';
  var a=STORE.procAuth(p.proc), turn=a?a.turn:5;
  return (p.dueInDays-turn)<=0 ? 'bad' : (p.dueInDays<=7?'warn':'neutral');
}

function setTab(t){ tab=t; render(); }

function render(){
  var data=STORE.data();
  var pa=data.priorAuth||[];
  var order=STORE.PA_ORDER;

  // stage counts (across all)
  var counts={}; order.forEach(function(s){ counts[s]=0; });
  pa.forEach(function(p){ if(counts[p.stage]!=null) counts[p.stage]++; });

  // deterministic appointment index by current order
  var rows=pa.map(function(p,i){ return {pa:p, idx:i}; });

  // filter for active tab
  rows=rows.filter(function(r){
    if(tab==='pending') return r.pa.stage!=='Approved';
    if(tab==='approved') return r.pa.stage==='Approved';
    return true;
  });

  // unapproved first, then soonest surgery date, then ageDays DESC
  rows.sort(function(a,b){
    var ua=(a.pa.stage!=='Approved')?0:1, ub=(b.pa.stage!=='Approved')?0:1;
    if(ua!==ub) return ua-ub;
    var da=(a.pa.dueInDays==null?9999:a.pa.dueInDays), db=(b.pa.dueInDays==null?9999:b.pa.dueInDays);
    if(da!==db) return da-db;
    return (b.pa.ageDays||0)-(a.pa.ageDays||0);
  });

  var kpis=order.map(function(s){
    return '<div class="panel kpi">'+
      '<div class="v" style="display:flex;align-items:center;gap:9px"><span class="dot '+STAGE_DOT[s]+'"></span>'+counts[s]+'</div>'+
      '<div class="l">'+esc(s)+'</div></div>';
  }).join('');

  var needsAction=pa.filter(function(p){return p.stage!=='Approved';}).length;
  var approvedCount=pa.filter(function(p){return p.stage==='Approved';}).length;
  var tabs=[
    ['all','All',pa.length],
    ['pending','Needs action',needsAction],
    ['approved','Approved',approvedCount]
  ].map(function(t){
    return '<button class="tab'+(tab===t[0]?' on':'')+'" onclick="setTab(\''+t[0]+'\')">'+esc(t[1])+
      ' <span class="kcol-n" style="opacity:.8">('+t[2]+')</span></button>';
  }).join('');

  var list=rows.map(function(r){
    var p=r.pa, st=p.stage, approved=(st==='Approved');
    var due=dueLabel(p), sev=dueSev(p);
    var sub='Pt. '+esc(p.pt)+' · '+esc(p.ins)+(p.site&&p.site!=='—'?' · '+esc(p.site):'')+' · '+(p.ageDays||0)+'d waiting';
    var action=approved
      ? '<span class="pill ok" style="margin-left:auto">'+TJ.icon('check','ico-sm')+'Approved</span>'
      : '<button class="btn primary sm" style="margin-left:auto" onclick="advance(\''+p.id+'\')">Advance '+TJ.icon('arrow','ico-sm')+'</button>';
    return '<div class="lrow">'+
      '<div class="ic">'+TJ.icon('shield')+'</div>'+
      '<div style="min-width:0;flex:1">'+
        '<div class="t">'+esc(p.proc)+' · CPT '+esc(p.cpt)+'</div>'+
        '<div class="d">'+sub+'</div>'+
        '<div class="d" style="margin-top:4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap">'+
          '<span class="pill '+STAGE_PILL[st]+'">'+esc(st)+'</span>'+
          (due?'<span class="pill '+sev+'">'+TJ.icon('clock','ico-sm')+due+'</span>':'')+
          (p.fromSchedule?'<span class="pill neutral">'+TJ.icon('calendar','ico-sm')+'from schedule</span>':'')+
          '<span>'+hint(p)+'</span>'+
        '</div>'+
      '</div>'+
      action+
    '</div>';
  }).join('') || '<div class="pad muted">No prior-authorizations in this view.</div>';

  document.getElementById('content').innerHTML=
    '<div class="page-head" style="display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap">'+
      '<div style="flex:1;min-width:240px">'+
        '<div class="eyebrow">Front desk</div>'+
        '<h2>Prior-authorization queue</h2>'+
        '<p>Auto-created from the surgery schedule — each tied to its surgery date, sorted by what’s on fire.</p>'+
      '</div>'+
      '<button class="btn primary" onclick="newPA()">'+TJ.icon('plus','ico-sm')+'New prior-auth</button>'+
    '</div>'+

    '<div class="note" style="margin-top:0">'+TJ.icon('stetho')+
      '<div>Dr. Giuffrida only sees the one PA blocking today’s schedule; everything here is the front desk’s job — de-identified, HIPAA-safe.</div></div>'+

    '<div class="grid g4" style="margin-top:18px">'+kpis+'</div>'+

    '<div class="tabbar" style="margin-top:22px">'+tabs+'</div>'+

    '<div class="panel">'+list+'</div>';
}

function advance(id){
  var pa=STORE.data().priorAuth.filter(function(p){return p.id===id;})[0];
  STORE.advancePriorAuth(id);
  if(pa) TJ.toast(pa.proc+' → next stage');
}

function newPA(){
  TJ.modal({
    title:'New prior-authorization',
    submitLabel:'Create',
    fields:[
      {name:'proc', label:'Procedure', type:'text', placeholder:'e.g. Mohs surgery'},
      {name:'cpt',  label:'CPT code',  type:'text', placeholder:'e.g. 17311'},
      {name:'pt',   label:'Patient initials', type:'text', placeholder:'e.g. J.R.'},
      {name:'ins',  label:'Insurer',  type:'select', options:[
        {value:'United HC',label:'United HC'},
        {value:'Aetna',label:'Aetna'},
        {value:'Cigna',label:'Cigna'},
        {value:'Florida Blue',label:'Florida Blue'},
        {value:'Medicare',label:'Medicare'},
        {value:'Humana',label:'Humana'}
      ]}
    ],
    onSubmit:function(v){
      if(!v.proc){ TJ.toast('Procedure is required'); return false; }
      STORE.addPriorAuth(v);
      TJ.toast(v.proc+' added to queue');
    }
  });
}
</script>
</body>
</html>
