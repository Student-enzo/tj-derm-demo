<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Supply room · Dermatology &amp; Skin Cancer Center</title>
<link rel="icon" href="assets/img/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="backdrop" onclick="TJ.toggleNav()"></div>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">
      <div id="content"></div>
    </div>
  </div>
</div>

<script src="assets/js/store.js"></script>
<script src="assets/js/inventory.js"></script>
<script src="assets/js/app.js"></script>
<script>
TJ.mount({active:'dashboard-ops', onReady:render});

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

/* ---------- big-action handlers ---------- */
var MOHS_KIT=[
  {itemId:'i-lido',qty:1},{itemId:'i-gauze',qty:4},{itemId:'i-cur',qty:1},
  {itemId:'i-nylon',qty:1},{itemId:'i-tray',qty:1},{itemId:'i-gloves',qty:2},{itemId:'i-alcl',qty:1}
];
function logMohsCase(){
  STORE.logCase({
    type:'Mohs surgery', who:'Jess',
    items:MOHS_KIT.filter(function(k){ return STORE.item(k.itemId); })
  });
  TJ.toast('Mohs case logged · kit deducted (FEFO)');
}
function quickOrder(id){
  var r=INV.reorderList().filter(function(x){return x.it.id===id;})[0];
  if(!r) return;
  STORE.purchase({itemId:id, qty:r.qty, user:'Jess'});
  TJ.toast('Ordered '+r.qty+' × '+r.it.name);
}
function quickUse(id){
  STORE.useStock({itemId:id, qty:1, user:'Jess'});
  TJ.toast('Used 1 × '+(STORE.item(id)||{}).name+' (FEFO)');
}

/* ---------- relative time ---------- */
function relTime(ts){
  var ms=Math.max(0,Date.now()-ts), m=Math.round(ms/60000);
  if(m<1) return 'just now';
  if(m<60) return m+'m ago';
  var h=Math.round(m/60);
  if(h<24) return h+'h ago';
  return Math.round(h/24)+'d ago';
}

/* ---------- pieces ---------- */
function renderHead(){
  return '<div class="page-head">'+
    '<div class="eyebrow">Supply room</div>'+
    '<h2>Hi Jess — what’s up today</h2>'+
    '<p>Log a case, receive a delivery, fix a count. One tap.</p>'+
  '</div>';
}

function renderKpis(){
  var k=INV.kpis();
  function tile(v,l){ return '<div class="panel kpi"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>'; }
  return '<div class="grid g4">'+
    tile(k.items,'Items')+
    tile(k.low,'To reorder')+
    tile(k.expiring,'Expiring ≤30')+
    tile(TJ.money(k.value),'Value')+
  '</div>';
}

function actionCard(icon,title,sub,onclick){
  return '<div class="panel pad" role="button" tabindex="0" style="cursor:pointer;display:flex;flex-direction:column;gap:12px" '+
    'onclick="'+onclick+'" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();'+onclick+'}">'+
    '<div style="width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent)">'+
      TJ.icon(icon,'ico-lg')+'</div>'+
    '<div><div style="font-weight:800;font-size:17px;letter-spacing:-.2px">'+title+'</div>'+
    '<div class="muted" style="font-size:13px;margin-top:3px">'+sub+'</div></div>'+
  '</div>';
}

function renderActions(){
  return '<div class="grid g3" style="margin-top:16px">'+
    actionCard('scissors','Log a Mohs case','Deducts the whole kit in one tap','logMohsCase()')+
    actionCard('truck','Receive a delivery','Scan the box — lot &amp; expiry auto-fill','location.href=\'receive-scan.html\'')+
    actionCard('box','Open inventory','Count, use, reorder, run the numbers','location.href=\'inventory.html\'')+
  '</div>';
}

function renderAttention(){
  var rows=[];
  INV.reorderList().forEach(function(r){
    var it=r.it;
    rows.push('<div class="lrow" style="border-left:4px solid var(--bad)">'+
      '<div class="ic" style="color:var(--bad-ink)">'+TJ.icon(it.tank?'snow':'box')+'</div>'+
      '<div><div class="t">'+esc(it.name)+'</div>'+
      '<div class="d">'+esc(r.vendor||'')+' · suggested '+r.qty+' '+esc(it.unit)+'</div></div>'+
      '<span class="pill bad">'+esc(r.reason||'Low')+'</span>'+
      (it.tank?'':'<button class="btn primary sm" style="margin-left:10px" onclick="quickOrder(\''+esc(it.id)+'\')">Order</button>')+
    '</div>');
  });
  INV.expiringList(7).forEach(function(e){
    var it=e.it, sev=e.bucket==='bad'?'bad':'warn';
    rows.push('<div class="lrow" style="border-left:4px solid var('+(sev==='bad'?'--bad':'--warn')+')">'+
      '<div class="ic" style="color:var('+(sev==='bad'?'--bad-ink':'--warn-ink')+')">'+TJ.icon('clock')+'</div>'+
      '<div><div class="t">'+esc(it.name)+'</div>'+
      '<div class="d">lot '+esc(e.lot.lot)+' · expires in '+e.days+' day'+(e.days===1?'':'s')+'</div></div>'+
      '<span class="pill '+sev+'">Expiring</span>'+
      '<button class="btn ghost sm" style="margin-left:10px" onclick="quickUse(\''+esc(it.id)+'\')">Use</button>'+
    '</div>');
  });
  var body=rows.length?rows.join(''):'<div class="lrow"><div class="t" style="font-weight:600;color:var(--ink-2)">Nothing urgent — nice.</div></div>';
  return '<div class="panel" style="margin-top:16px">'+
    '<div class="p-head">'+TJ.icon('alert')+'<strong>Needs attention</strong>'+
      (rows.length?'<span class="pill warn" style="margin-left:auto">'+rows.length+'</span>':'')+'</div>'+
    body+
  '</div>';
}

function renderActivity(){
  var audit=(STORE.data().audit||[]).slice(0,7);
  var rows=audit.map(function(a){
    return '<div class="lrow">'+
      '<span class="pill neutral">'+esc(a.action)+'</span>'+
      '<div class="t" style="font-weight:600">'+esc(a.detail)+'</div>'+
      '<div class="d" style="margin-left:auto">'+esc(relTime(a.ts))+'</div>'+
    '</div>';
  }).join('');
  if(!rows) rows='<div class="lrow"><div class="t" style="font-weight:600;color:var(--ink-2)">No activity yet.</div></div>';
  return '<div class="panel" style="margin-top:16px">'+
    '<div class="p-head">'+TJ.icon('clock')+'<strong>Today’s activity</strong></div>'+
    rows+
  '</div>';
}

function render(){
  var el=document.getElementById('content');
  if(!el) return;
  el.innerHTML=
    renderHead()+
    renderKpis()+
    renderActions()+
    renderAttention()+
    renderActivity();
}

STORE.on(render);
</script>
</body>
</html>
