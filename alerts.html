<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Alerts &amp; reorder · Dermatology &amp; Skin Cancer Center</title>
<link rel="icon" href="assets/img/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="backdrop" onclick="TJ.toggleNav()"></div>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content" id="screen"></div>
  </div>
</div>

<script src="assets/js/store.js"></script>
<script src="assets/js/inventory.js"></script>
<script src="assets/js/app.js"></script>
<script>
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

function setMode(auto){
  TJ.state.autoReorder=!!auto; TJ.save();
  TJ.toast(auto?'Auto-reorder at par on':'Doctor approves each on');
  render();
}

function poDraft(id, qty){
  STORE.sendPO({itemId:id, qty:qty});
  TJ.toast('PO sent — tracked Draft → Sent');
}
function useOne(id){ STORE.useStock({itemId:id, qty:1}); }
function snooze(){ TJ.toast('Snoozed 7 days'); }

function render(){
  var auto=!!TJ.state.autoReorder;

  /* ---- Daily expiry digest ---- */
  var exp=INV.expiringList(30);
  var digest;
  if(!exp.length){
    digest='<div class="lrow"><div class="t">Nothing expiring in 30 days.</div></div>';
  } else {
    digest=exp.map(function(e){
      var b=e.bucket; // 'bad' (<=7) or 'warn' (<=30)
      return '<div class="lrow">'+
        '<span class="dot '+b+'"></span>'+
        '<div style="flex:1;min-width:0">'+
          '<div class="t">'+esc(e.it.name)+'</div>'+
          '<div class="d">in '+e.days+' days · lot '+esc(e.lot.lot)+'</div>'+
        '</div>'+
        '<div class="row" style="gap:8px;flex-wrap:nowrap;margin-left:auto">'+
          '<button class="btn primary sm" onclick="poDraft(\''+e.it.id+'\','+INV.suggestedQty(e.it)+')">'+TJ.icon('truck','ico-sm')+'Reorder</button>'+
          '<button class="btn ghost sm" onclick="useOne(\''+e.it.id+'\')">'+TJ.icon('check','ico-sm')+'Mark used</button>'+
          '<button class="btn ghost sm" onclick="snooze()">'+TJ.icon('clock','ico-sm')+'Snooze</button>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  /* ---- Reorder drafts ---- */
  var ro=INV.reorderList();
  var pos;
  if(!ro.length){
    pos='<div class="lrow"><div class="t">All items above par.</div></div>';
  } else {
    pos=ro.map(function(r){
      return '<div class="panel pad" style="box-shadow:var(--ring-1)">'+
        '<div class="row" style="justify-content:space-between;align-items:center;flex-wrap:nowrap">'+
          '<strong>'+esc(r.it.name)+' &times; '+r.qty+'</strong>'+
          '<span class="cost">'+TJ.money(r.cost)+'</span>'+
        '</div>'+
        '<div class="tiny" style="margin:5px 0 11px">'+esc(r.vendor||'—')+'</div>'+
        (auto
          ? '<button class="btn ghost full" disabled><span class="pill ok">'+TJ.icon('check','ico-sm')+'Auto-sent</span></button>'
          : '<button class="btn primary full" onclick="poDraft(\''+r.it.id+'\','+r.qty+')">'+TJ.icon('truck','ico-sm')+'Send PO</button>')+
      '</div>';
    }).join('');
  }

  /* ---- Note ---- */
  var note=auto
    ? TJ.icon('zap')+'<div><strong>Auto-reorder at par.</strong> When an item hits its par level the PO sends to the preferred vendor automatically and just logs here. Best for predictable staples.</div>'
    : TJ.icon('shield')+'<div><strong>Doctor approves each.</strong> Every reorder waits for a one-tap confirmation. Best while the practice builds trust in the par levels.</div>';

  document.getElementById('screen').innerHTML=
    '<div class="page-head">'+
      '<div class="eyebrow">The less-to-do engine</div>'+
      '<h2>Alerts &amp; reorder</h2>'+
      '<p>The system watches every item and drafts the orders. Every alert has a next step.</p>'+
    '</div>'+

    '<div class="row" style="align-items:center;margin-bottom:18px">'+
      '<span class="flag">Workflow option</span>'+
      '<div class="seg">'+
        '<button class="'+(!auto?'on':'')+'" onclick="setMode(false)">Doctor approves each</button>'+
        '<button class="'+(auto?'on':'')+'" onclick="setMode(true)">Auto-reorder at par</button>'+
      '</div>'+
      '<span class="tiny">'+(auto
        ? 'Staples reorder themselves at par — the doctor sees only exceptions.'
        : 'Nothing orders without a tap — full control.')+'</span>'+
    '</div>'+

    '<div class="row stretch">'+
      '<div class="panel" style="flex:1;min-width:300px">'+
        '<div class="p-head"><strong>Daily expiry digest</strong><span class="tiny" style="margin-left:auto">one digest, not per-item noise</span></div>'+
        '<div>'+digest+'</div>'+
      '</div>'+
      '<div class="panel" style="flex:1;min-width:300px">'+
        '<div class="p-head"><strong>'+(auto?'Auto-sent orders':'Reorder drafts')+'</strong><span class="tiny" style="margin-left:auto">vendor &amp; qty pre-filled</span></div>'+
        '<div class="pad" style="display:flex;flex-direction:column;gap:12px">'+pos+'</div>'+
      '</div>'+
    '</div>'+

    '<div class="note">'+note+'</div>';
}

TJ.mount({active:'alerts', onReady:render});
STORE.on(render);
</script>
</body>
</html>
